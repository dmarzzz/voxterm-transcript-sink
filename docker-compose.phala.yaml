# Phala Cloud PRODUCTION deployment for voxterm-data-sink.
#
# The image is pinned by IMMUTABLE DIGEST from a REPRODUCIBLE build (digest-pinned
# base + hash-locked deps + SOURCE_DATE_EPOCH; see docs/REPRODUCE.md §3 for the
# exact command). Rebuilding from this commit reproduces the same digest. Repin
# only when intentionally releasing.
#
# Deploy with Phala CLI and provide VOXTERM_SINK_READ_SECRET as an encrypted
# environment variable. Do not commit a real secret into this file.
services:
  voxterm-data-sink:
    image: sh1sh1nk/voxterm-data-sink@sha256:836bb5f28ffc85b572d096a7b6511353f24a567caea2d3c9d6e6efb43589742d
    restart: always
    environment:
      - VOXTERM_SINK_READ_SECRET=${VOXTERM_SINK_READ_SECRET:?set via phala deploy -e}
      - VOXTERM_SINK_ATTEST=dstack
      - VOXTERM_SINK_SNAPSHOT=/data/sink-snapshot.json
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - sink-data:/data
    ports:
      - "8723:8723"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8723/v1/health', timeout=3).read()\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sink-data:
